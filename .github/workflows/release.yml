name: Release

on:
  release:
    types:
      - published

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Zip integration
        run: |
          cd custom_components/ps4_goldhen
          zip -r ../../ps4_goldhen.zip .

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: ps4_goldhen.zip
