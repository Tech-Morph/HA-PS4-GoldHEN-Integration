wake:
  name: Wake PS4
  description: 'Wake the PS4 from standby using DDP wake-up via the GoldHEN add-on.'
  fields: {}

standby:
  name: Put PS4 in Standby
  description: 'Send the PS4 to standby/rest mode via the GoldHEN add-on.'
  fields: {}

reboot:
  name: Reboot PS4
  description: 'Reboot the PS4 via the GoldHEN add-on.'
  fields: {}

send_payload:
  name: Send Payload
  description: 'Send a .bin payload to the PS4 GoldHEN BinLoader via the add-on.'
  fields:
    payload_file:
      name: Payload file
      description: 'Filename of the payload (e.g. "mira.bin"). Must be placed in /config/ps4_payloads/ on the HA host.'
      required: true
      selector:
        text:
    timeout:
      name: Timeout (seconds)
      description: 'How long to wait for the payload to send before giving up. Defaults to 10.'
      required: false
      selector:
        number:
          min: 5
          max: 120
          unit_of_measurement: s
